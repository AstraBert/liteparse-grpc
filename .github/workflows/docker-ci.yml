name: Docker CI

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - crates/grpc/src/client.rs
      - README.md
      - .github/workflows/docker-publish.yml

jobs:
  build-docker-image:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Build the base Docker image
        run: docker build .
